<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>My Events — Circles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink-0: #111827;
      --ink-1: #374151;
      --ink-2: #6B7280;
      --base: #F9FAFB;
      --base-2: #F3F4F6;
      --surface: #FFFFFF;
      --surface-2: #FFFFFF;
      --edge: #E5E7EB;
      --edge-2: #D1D5DB;
      --violet: #2563EB;
      --violet-soft: rgba(37, 99, 235, 0.08);
      --grad: linear-gradient(135deg, #111827 0%, #2563EB 100%);
      --font-u: 'Inter', system-ui, sans-serif;
      --nav-h: 72px;
      --radius: 20px;
      --pill: 9999px;
      --shadow-md: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: var(--font-u);
      background: var(--base);
      color: var(--ink-0);
      font-size: 13px;
      min-height: 100vh;
    }

    .topnav {
      height: var(--nav-h);
      background: rgba(244, 243, 251, 0.93);
      backdrop-filter: blur(28px);
      border-bottom: 1px solid var(--edge);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 max(24px, calc(50vw - 580px));
      gap: 16px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      color: var(--ink-0);
    }

    .nav-spacer {
      flex: 1;
    }

    .nav-links {
      display: flex;
      gap: 4px;
    }

    .nav-link {
      padding: 8px 14px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-2);
      text-decoration: none;
    }

    .nav-link.active {
      color: var(--violet);
      background: var(--violet-soft);
    }

    .nav-av {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--grad);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid #fff;
    }

    .page {
      max-width: 1160px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .hero-empty {
      background: #fff;
      border: 1px solid var(--edge);
      padding: 80px 40px;
      border-radius: 20px;
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--surface-2);
      border: 1px solid var(--edge);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      cursor: default;
    }

    .card-title {
      font-family: var(--font-d);
      font-size: 26px;
    }

    .card-meta {
      font-size: 12px;
      color: var(--ink-2);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: var(--pill);
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13.5px;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn-pri {
      background: var(--grad);
      color: #fff;
    }

    .btn-sec {
      background: var(--base-2);
      color: var(--ink-1);
    }

    .team-box {
      background: var(--base-2);
      padding: 16px;
      border-radius: 12px;
      margin-top: 8px;
      border: 1px dashed var(--edge-2);
    }

    .team-badge {
      display: inline-block;
      padding: 3px 8px;
      background: #fff;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--violet);
      margin-bottom: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: #fff;
      padding: 32px;
      border-radius: 18px;
      width: 90%;
      max-width: 400px;
      position: relative;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #000;
      color: #fff;
      padding: 10px 20px;
      border-radius: 30px;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
      z-index: 2000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--base-2);
      border: 1px solid var(--edge);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-2);
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-icon:hover {
      background: var(--violet-soft);
      color: var(--violet);
      border-color: var(--violet);
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <nav class="topnav">
    <a href="/" class="nav-brand">
      <svg width="22" height="22" viewBox="0 0 26 26" fill="none">
        <circle cx="13" cy="13" r="10.5" stroke="#111827" stroke-width="2" />
        <circle cx="13" cy="13" r="2.2" fill="#111827" />
      </svg>
      Circles
    </a>
    <div class="nav-spacer"></div>
    <div class="nav-links">
      <a href="/participant" class="nav-link active">My Events</a>
      <a href="/discover" class="nav-link">Discover</a>
      <a href="/" class="nav-link">Home</a>
    </div>
    <div class="nav-av" id="navAv">U</div>
  </nav>

  <div class="page">
    <h1 style="font-size:48px; font-weight: 800; letter-spacing: -0.04em; margin-bottom:32px;">My <span>Journey.</span>
    </h1>

    <div id="empty" class="hero-empty" style="padding: 100px 24px;">
      <h2 style="font-size:32px; font-weight: 800; letter-spacing: -0.02em;">No registrations yet</h2>
      <p style="color:var(--ink-2); font-size: 16px; margin: 12px 0 24px;">You haven't registered for any events yet.
        Start your journey by exploring available
        events.</p>
      <a href="/discover" class="btn btn-pri">Discover Events</a>
    </div>

    <div id="grid" class="events-grid"></div>
  </div>

  <!-- QR Modal -->
  <div id="qrModal" class="modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-content" style="text-align:center">
      <h3 id="qrTitle" style="font-family:var(--font-d); font-size:24px; margin-bottom:16px;">Ticket</h3>
      <img id="qrImg" style="width:200px; height:200px; margin:10px auto; display:block">
      <p style="font-size:12px; color:var(--ink-2); margin-top:16px;">Show this QR code at the entrance.</p>
      <button class="btn btn-sec" style="margin-top:20px; width:100%"
        onclick="document.getElementById('qrModal').style.display='none'">Close</button>
    </div>
  </div>

  <!-- Team Modal -->
  <div id="teamModal" class="modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-content">
      <h3 id="tmTitle" style="font-family:var(--font-d); font-size:24px; margin-bottom:16px;">Team Action</h3>
      <div id="tmBody"></div>
      <button class="btn btn-sec" style="margin-top:20px; width:100%"
        onclick="document.getElementById('teamModal').style.display='none'">Cancel</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const tk = localStorage.getItem('token');
    const u = JSON.parse(localStorage.getItem('user') || '{}');
    if (!tk) window.location.href = '/';
    if (u.name) document.getElementById('navAv').textContent = u.name[0].toUpperCase();

    function showT(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

    async function load() {
      const res = await fetch('/api/auth/me/registrations', { headers: { 'Authorization': 'Bearer ' + tk } });
      const data = await res.json();
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');

      if (!data.registrations || data.registrations.length === 0) {
        empty.style.display = 'flex';
        grid.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      grid.style.display = 'grid';

      grid.innerHTML = (data.registrations || []).map(reg => {
        const e = reg.event;
        const myTeam = (data.teams || []).find(tm => tm.team?.eventId === e.id);
        const canTeam = e.maxTeamSize > 1;
        const d = new Date(e.startDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        return `
          <div class="card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
            <div style="height: 120px; background: linear-gradient(to bottom right, #f8fafc, #eff6ff); display: flex; align-items: center; justify-content: center; color: var(--violet); border-bottom: 1px solid var(--edge);">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div style="padding: 32px;">
                <h3 style="font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px;">${e.title}</h3>
                <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px;">
                    <div style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--ink-2); font-weight: 500;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        ${d}
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--ink-2); font-weight: 500;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${e.venue || 'Virtual'}
                    </div>
                </div>
                
                <div style="display:flex; flex-direction: column; gap:10px;">
                  <div style="display:flex; gap:10px;">
                    <button class="btn btn-pri" style="flex:1" onclick="viewT('${e.id}', '${e.title}')">View Ticket</button>
                    ${canTeam && !myTeam ? `<button class="btn btn-sec" style="flex:1" onclick="teamOp('${e.id}', 'options')">Team</button>` : ''}
                    ${myTeam ? `<button class="btn btn-sec" style="flex:1" onclick="teamOp('${e.id}', 'view', '${myTeam.team.id}')">My Team</button>` : ''}
                  </div>
                  <button class="btn btn-sec" style="width:100%; justify-content: center; background: var(--violet-soft); color: var(--violet); border: 1px solid var(--edge-2);" onclick="shareEv('${e.id}', '${e.title.replace(/'/g, "\\'")}')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:8px"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8m-11-4 3-3 3 3m-3-3v12"/></svg>
                    Share link with friends
                  </button>
                </div>

                ${myTeam ? `
                  <div class="team-box" style="margin-top: 20px">
                    <span class="team-badge">TEAM: ${myTeam.team.name}</span>
                    <div style="font-size:12px; font-weight: 500; color:var(--ink-2)">Invite Code: <strong style="color:var(--violet); font-family:monospace">${myTeam.team.inviteCode}</strong></div>
                    <div style="font-size:11px; color:var(--ink-3); margin-top:6px">${myTeam.team.members.length}/${e.maxTeamSize} members</div>
                  </div>
                ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    async function viewT(id, title) {
      const res = await fetch('/api/events/' + id + '/ticket/qr', { headers: { 'Authorization': 'Bearer ' + tk } });
      const data = await res.json();
      document.getElementById('qrTitle').textContent = title;
      document.getElementById('qrImg').src = data.qrCode;
      document.getElementById('qrModal').style.display = 'flex';
    }

    function teamOp(evId, op, tmId) {
      const modal = document.getElementById('teamModal');
      const body = document.getElementById('tmBody');
      const title = document.getElementById('tmTitle');
      modal.style.display = 'flex';

      if (op === 'options') {
        title.textContent = 'Team Options';
        body.innerHTML = `
          <p style="margin-bottom:20px; color:var(--ink-2)">Form a team to collaborate with others.</p>
          <button class="btn btn-pri" style="width:100%; margin-bottom:10px" onclick="teamOp('${evId}', 'create')">Create New Team</button>
          <button class="btn btn-sec" style="width:100%" onclick="teamOp('${evId}', 'join')">Join Existing Team</button>
        `;
      } else if (op === 'create') {
        title.textContent = 'Create Team';
        body.innerHTML = `
          <input type="text" id="tmName" placeholder="Enter Team Name" style="width:100%; padding:12px; border:1px solid var(--edge-2); border-radius:8px; margin-bottom:16px">
          <button class="btn btn-pri" style="width:100%" onclick="doCreate('${evId}')">Create & Generate Invite</button>
        `;
      } else if (op === 'join') {
        title.textContent = 'Join Team';
        body.innerHTML = `
          <input type="text" id="tmCode" placeholder="Enter Invite Code" style="width:100%; padding:12px; border:1px solid var(--edge-2); border-radius:8px; margin-bottom:16px">
          <button class="btn btn-pri" style="width:100%" onclick="doJoin()">Join Team</button>
        `;
      } else if (op === 'view') {
        title.textContent = 'Team Details';
        body.innerHTML = '<p style="text-align:center; padding:20px; color:var(--ink-3)">Loading team info...</p>';
        // Detailed view could be added here
        document.getElementById('teamModal').style.display = 'none';
        showT('Team info displayed on card');
      }
    }

    async function doCreate(evId) {
      const name = document.getElementById('tmName').value;
      if (!name) return alert('Name required');
      const res = await fetch('/api/events/' + evId + '/teams', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + tk, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      if (res.ok) { showT('Team created!'); document.getElementById('teamModal').style.display = 'none'; load(); }
      else { const d = await res.json(); alert(d.error || 'Failed'); }
    }

    async function doJoin() {
      const inviteCode = document.getElementById('tmCode').value;
      if (!inviteCode) return alert('Code required');
      const res = await fetch('/api/teams/join', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + tk, 'Content-Type': 'application/json' },
        body: JSON.stringify({ inviteCode })
      });
      if (res.ok) { showT('Joined team!'); document.getElementById('teamModal').style.display = 'none'; load(); }
      else { const d = await res.json(); alert(d.error || 'Failed'); }
    }

    async function shareEv(id, title) {
      const link = `${window.location.origin}/register.html?event=${id}`;
      try {
        await navigator.clipboard.writeText(link);
        showT(`Link copied for ${title}!`);
      } catch (err) {
        showT('Failed to copy link');
      }
    }

    load();
  </script>
</body>

</html>
