<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status — Circles</title>
    <link rel="stylesheet" href="Landingpage.css">
    <style>
        body {
            background: #0d0c1a;
            color: #fff;
            font-family: 'Geist', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 800px;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 48px;
            margin-bottom: 24px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(10, 170, 110, 0.1);
            color: #0aaa6e;
            padding: 8px 16px;
            border-radius: 99px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        p {
            line-height: 1.6;
            color: #a1a1aa;
            font-size: 18px;
        }

        .back-link {
            display: inline-block;
            margin-top: 32px;
            color: #6040f0;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="status-badge">
            <span class="status-dot"></span>
            All Systems Operational
        </div>
        <h1>System Status</h1>
        <p>Circles is performing optimally. All operational nodes, real-time sync engines, and database clusters are
            healthy.</p>
        <p>Operational Uptime: 99.99%</p>
        <a href="/" class="back-link">← Back to Home</a>
    </div>
</body>

</html>
