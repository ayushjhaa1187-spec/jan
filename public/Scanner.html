<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circles — QR Scanner</title>
    <link rel="stylesheet" href="/admin-shared.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="/admin-global-search.js"></script>
    <style>
        .scanner-view {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        #reader {
            width: 100%;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--edge);
            background: var(--base-2);
        }

        .history-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--edge);
        }

        .history-card:last-child {
            border-bottom: none;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-success {
            background: var(--emerald);
            box-shadow: 0 0 8px var(--emerald);
        }

        .status-error {
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
        }

        .manual-box {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .manual-box input {
            flex: 1;
        }

        .result-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: var(--radius);
            animation: fadeIn 0.3s ease;
            text-align: center;
            padding: 40px;
        }

        .result-overlay.success {
            border: 2px solid var(--emerald);
        }

        .result-overlay.error {
            border: 2px solid var(--danger);
        }

        .ico-large {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }
    </script>
</head>

<body class="light-mode">

    <!-- ══════════════════════ SIDEBAR ══════════════════════ -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="/" class="nav-logo">
                <svg class="logo-svg" viewBox="0 0 26 26" fill="none">
                    <defs>
                        <linearGradient id="lg-sb" x1="2" y1="2" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6040f0" />
                            <stop offset="1" stop-color="#1a96d8" />
                        </linearGradient>
                    </defs>
                    <circle cx="13" cy="13" r="10.5" stroke="url(#lg-sb)" stroke-width="1.6" />
                    <circle cx="13" cy="13" r="6" stroke="url(#lg-sb)" stroke-width="1.2" opacity=".55" />
                    <circle cx="13" cy="13" r="2.2" fill="url(#lg-sb)" />
                </svg>
                Circles
            </a>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-lbl">Main</div>
            <div class="nav-item" onclick="window.location.href='/dashboard'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                Dashboard
            </div>
            <div class="nav-item" onclick="window.location.href='/events'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <rect x="3" y="4" width="18" height="18" rx="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                Events
            </div>
            <div class="nav-item" onclick="window.location.href='/attendees'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                </svg>
                Attendees
            </div>
            <div class="nav-lbl">Management</div>
            <div class="nav-item active" onclick="window.location.href='/scanner'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                    <circle cx="12" cy="13" r="4" />
                </svg>
                Scanner
            </div>
            <div class="nav-item" onclick="window.location.href='/ai-mode'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z" />
                    <path d="M12 6a6 6 0 1 0 6 6 6 6 0 0 0-6-6zm0 10a4 4 0 1 1 4-4 4 4 0 0 1-4 4z" />
                </svg>
                AI mode
            </div>
            <div class="nav-item" onclick="window.location.href='/settings'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68V9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
                Settings
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="sb-user">
                <div class="av-sm" id="userInitials">AD</div>
                <div style="flex:1;min-width:0">
                    <div class="u-name" id="userName">Admin</div>
                    <div class="u-role">Event Admin</div>
                </div>
                <button id="logoutBtn" class="icon-btn" style="color:var(--danger); margin-left: auto;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <!-- ══════════════════════ MAIN ══════════════════════ -->
    <div class="main">
        <header class="topbar">
            <div class="topbar-ev">
                <div class="ev-sel">
                    <span id="eventName">Select Event</span>
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <polyline points="6 9 12 15 18 9" />
                    </svg>
                </div>
                <div class="ev-meta">
                    Operations • QR Check-in System
                </div>
            </div>
            <div class="tb-actions">
                <button class="icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                    <span class="notif-dot"></span>
                </button>
            </div>
        </header>

        <main class="content">
            <div class="page-hdr animate-fade">
                <div>
                    <h1 class="page-title">QR Scanner</h1>
                    <div class="page-sub">Scan participant codes for instant check-in performance</div>
                </div>
                <div class="hdr-actions">
                    <button class="btn btn-sec" id="btn-stop" onclick="stopScanner()" disabled>Stop</button>
                    <button class="btn btn-pri" id="btn-start" onclick="startScanner()">Start Camera</button>
                </div>
            </div>

            <div class="two-col stagger-entry">
                <!-- Scanner Panel -->
                <div class="panel" style="position: relative;">
                    <div class="panel-hdr">
                        <div class="panel-title">Camera View</div>
                    </div>
                    <div class="panel-body">
                        <div id="reader"></div>

                        <div class="manual-box">
                            <input type="text" id="manual-reg-id" class="f-input"
                                placeholder="Manual Registration ID...">
                            <button class="btn btn-sec" onclick="manualCheckIn()">Check-in</button>
                        </div>
                    </div>

                    <!-- Result Overlay -->
                    <div id="resultOverlay" class="result-overlay" style="display:none;">
                        <div class="ico-large" id="resultIcon">✓</div>
                        <h2 id="resultTitle">Checked In</h2>
                        <p id="resultSub" class="u-role">Participant Name</p>
                        <button class="btn btn-pri" style="margin-top:24px" onclick="hideResult()">Continue
                            Scanning</button>
                    </div>
                </div>

                <!-- History Panel -->
                <div class="panel">
                    <div class="panel-hdr">
                        <div class="panel-title">Recent Activity</div>
                    </div>
                    <div class="panel-body" id="history-list" style="padding:0">
                        <div style="padding:40px; text-align:center; color:var(--ink-3)">No scans in this session</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        let html5QrCode = null;
        let isScanning = false;
        let scanHistory = [];

        // Init UI
        if (user.profile) {
            document.getElementById('userName').textContent = user.profile.name;
            document.getElementById('userInitials').textContent = user.profile.name.substring(0, 2).toUpperCase();
        }

        async function startScanner() {
            if (isScanning) return;
            try {
                html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 },
                    onScanSuccess,
                    (err) => { }
                );
                isScanning = true;
                document.getElementById('btn-start').disabled = true;
                document.getElementById('btn-stop').disabled = false;
                showToast('Camera active', 'success');
            } catch (err) {
                showToast('Camera access denied', 'error');
            }
        }

        async function stopScanner() {
            if (!isScanning) return;
            await html5QrCode.stop();
            isScanning = false;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-stop').disabled = true;
        }

        async function onScanSuccess(decodedText) {
            if (isScanning) await html5QrCode.pause(true);

            let regId = decodedText.trim();
            try {
                const data = JSON.parse(decodedText);
                if (data.registrationId) regId = data.registrationId;
            } catch (e) { }

            await performCheckIn(regId);
        }

        async function performCheckIn(registrationId) {
            try {
                const res = await fetch(`/api/admin/registrations/${registrationId}/checkin`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const result = await res.json();

                if (res.ok) {
                    showResult('success', 'Checked In', result.registration?.user?.profile?.name || 'Participant');
                    addToHistory(result.registration?.user?.profile?.name || 'Participant', true);
                } else {
                    showResult('error', 'Check-in Failed', result.error || 'Invalid Registration');
                    addToHistory('Scan Failed', false);
                }
            } catch (err) {
                showToast('Network error', 'error');
            }
        }

        function showResult(type, title, sub) {
            const overlay = document.getElementById('resultOverlay');
            overlay.className = 'result-overlay ' + type;
            document.getElementById('resultIcon').textContent = type === 'success' ? '✓' : '✗';
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultSub').textContent = sub;
            overlay.style.display = 'flex';
        }

        function hideResult() {
            document.getElementById('resultOverlay').style.display = 'none';
            if (isScanning) html5QrCode.resume();
        }

        function addToHistory(name, success) {
            scanHistory.unshift({ name, success, time: new Date().toLocaleTimeString([], { timeStyle: 'short' }) });
            const list = document.getElementById('history-list');
            list.innerHTML = scanHistory.slice(0, 10).map(h => `
        <div class="history-card">
          <div class="status-dot ${h.success ? 'status-success' : 'status-error'}"></div>
          <div style="flex:1">
            <div style="font-weight:600; font-size:14px">${h.name}</div>
            <div style="font-size:12px; color:var(--ink-2)">${h.time}</div>
          </div>
        </div>
      `).join('');
        }

        async function manualCheckIn() {
            const id = document.getElementById('manual-reg-id').value.trim();
            if (!id) return;
            await performCheckIn(id);
            document.getElementById('manual-reg-id').value = '';
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + type;
            setTimeout(() => t.className = 'toast', 3000);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '/';
        });
    </script>
</body>

</html>
