<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Discover Events — Circles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --ink-0: #111827;
            --ink-1: #374151;
            --ink-2: #6B7280;
            --base: #F9FAFB;
            --base-2: #F3F4F6;
            --surface: #FFFFFF;
            --surface-2: #FFFFFF;
            --edge: #E5E7EB;
            --edge-2: #D1D5DB;
            --violet: #2563EB;
            --violet-soft: rgba(37, 99, 235, 0.08);
            --grad: linear-gradient(135deg, #111827 0%, #2563EB 100%);
            --font-u: 'Inter', system-ui, sans-serif;
            --nav-h: 72px;
            --radius: 20px;
            --pill: 9999px;
            --shadow-md: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: var(--font-u);
            background: var(--base);
            color: var(--ink-0);
            font-size: 13px;
            line-height: 1.55;
            min-height: 100vh;
        }

        .topnav {
            height: var(--nav-h);
            background: rgba(244, 243, 251, 0.93);
            backdrop-filter: blur(28px);
            border-bottom: 1px solid var(--edge);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 max(24px, calc(50vw - 580px));
            gap: 16px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--ink-0);
            font-weight: 700;
            font-size: 15px;
        }

        .nav-spacer {
            flex: 1;
        }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            padding: 8px 14px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-2);
            text-decoration: none;
        }

        .nav-link.active {
            color: var(--violet);
            background: var(--violet-l);
        }

        .nav-av {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--grad);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .page {
            max-width: 1160px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        .title {
            font-size: 48px;
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .title span {
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 40px;
        }

        .card {
            background: var(--surface-2);
            border: 1px solid var(--edge);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .card-img {
            height: 180px;
            background: #fdfdfd;
            border-bottom: 1px solid var(--edge);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--violet);
            opacity: 0.8;
        }

        .card-body {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .card-meta {
            font-size: 14px;
            color: var(--ink-2);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-item svg {
            opacity: 0.6;
        }

        .card-foot {
            padding: 20px 24px;
            border-top: 1px solid var(--edge);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 10px 24px;
            border-radius: var(--pill);
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 13.5px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-pri {
            background: var(--grad);
            color: #fff;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #000;
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            opacity: 0;
            transition: 0.3s;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <nav class="topnav">
        <a href="/" class="nav-brand">
            <svg width="22" height="22" viewBox="0 0 26 26" fill="none">
                <circle cx="13" cy="13" r="10.5" stroke="#111827" stroke-width="2" />
                <circle cx="13" cy="13" r="2.2" fill="#111827" />
            </svg>
            Circles
        </a>
        <div class="nav-spacer"></div>
        <div class="nav-links">
            <a href="/participant" class="nav-link">My Events</a>
            <a href="/discover" class="nav-link active">Discover</a>
            <a href="/" class="nav-link">Home</a>
        </div>
        <div class="nav-av" id="navAv">U</div>
    </nav>
    <div class="page">
        <h1 class="title" style="font-family: var(--font-u); font-weight: 800; letter-spacing: -0.04em;">Explore
            <span>Events.</span>
        </h1>
        <p style="color:var(--ink-2); font-size:16px; font-weight: 500;">Hand-picked experiences powered by Circles.</p>
        <div id="grid" class="events-grid"></div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
        const tk = localStorage.getItem('token');
        const u = JSON.parse(localStorage.getItem('user') || '{}');
        if (!tk) window.location.href = '/';
        if (u.name) document.getElementById('navAv').textContent = u.name[0].toUpperCase();

        function showT(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

        async function load() {
            const res = await fetch('/api/events');
            const evs = await res.json();
            const myRes = await fetch('/api/auth/me/registrations', { headers: { 'Authorization': 'Bearer ' + tk } });
            const myData = await myRes.json();
            const myIds = (myData.registrations || []).map(r => r.eventId);

            const grid = document.getElementById('grid');
            grid.innerHTML = (evs || []).map(e => {
                const reg = myIds.includes(e.id);
                const d = new Date(e.startDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                return `
          <div class="card">
            <div class="card-img" style="background: linear-gradient(to bottom right, #f8fafc, #eff6ff)">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div class="card-body" style="padding: 32px">
              <h3 class="card-title" style="margin-bottom: 20px">${e.title}</h3>
              <div class="card-meta">
                  <div class="meta-item">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                      ${d}
                  </div>
                  <div class="meta-item">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                      ${e.venue || 'Virtual'}
                  </div>
              </div>
            </div>
            <div class="card-foot" style="padding: 24px 32px">
              <span style="font-weight:700; color:var(--violet); font-size:14px; letter-spacing: 0.02em">${reg ? 'REGISTERED' : 'AVAILABLE'}</span>
              ${reg ?
                        '<a href="/participant" class="btn btn-pri" style="background:#059669">Go to Event</a>' :
                        `<button class="btn btn-pri" onclick="regEv('${e.id}')">Reserve Spot</button>`
                    }
            </div>
          </div>
        `;
            }).join('');
        }

        async function regEv(id) {
            const res = await fetch('/api/events/' + id + '/register', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + tk, 'Content-Type': 'application/json' },
                body: JSON.stringify({ fieldValues: [] })
            });
            if (res.ok) { showT('Registered!'); setTimeout(() => window.location.href = '/participant', 1000); }
            else alert('Failed to register');
        }
        document.getElementById('navAv').onclick = () => { localStorage.clear(); window.location.href = '/'; };
        load();
    </script>
</body>

</html>
